<aside class="soc-sidebar">
  <div class="soc-brand">
    <span class="soc-brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M12 3l7 3v6c0 4.5-2.7 7.8-7 9-4.3-1.2-7-4.5-7-9V6l7-3Z"></path>
        <path d="M9.5 12.5l1.6 1.6 3.8-4.2"></path>
      </svg>
    </span>
    <div class="soc-brand-title">NetGuard SOC</div>
    <div class="soc-brand-subtitle">Risk-based operations</div>
  </div>

  <nav class="soc-nav" aria-label="Primary">
    <div class="soc-nav-label">Monitoring</div>
    <a class="soc-nav-link {% if active_page == 'overview' %}is-active{% endif %}" href="/soc" {% if active_page == 'overview' %}aria-current="page"{% endif %}>
      <span>Overview</span>
    </a>
    <a class="soc-nav-link {% if active_page == 'agents' %}is-active{% endif %}" href="/soc/hosts" {% if active_page == 'agents' %}aria-current="page"{% endif %}>
      <span>Agents</span>
    </a>

    <div class="soc-nav-label">Investigation</div>
    <a class="soc-nav-link" href="/admin/inbox">
      <span>Operator Inbox</span>
    </a>
    <a class="soc-nav-link {% if active_page == 'hosts' %}is-active{% endif %}" href="/soc/hosts" {% if active_page == 'hosts' %}aria-current="page"{% endif %}>
      <span>Host Triage</span>
    </a>
    <a class="soc-nav-link {% if active_page == 'incidents' %}is-active{% endif %}" href="/soc/incidents" {% if active_page == 'incidents' %}aria-current="page"{% endif %}>
      <span>Incidents</span>
    </a>

    <div class="soc-nav-label">Management</div>
    <a class="soc-nav-link" href="/admin">
      <span>Tenants</span>
    </a>
    <a class="soc-nav-link {% if active_page == 'rules' %}is-active{% endif %}" href="/soc/grid" {% if active_page == 'rules' %}aria-current="page"{% endif %}>
      <span>Rules</span>
    </a>

    <div class="soc-nav-label">System</div>
    <a class="soc-nav-link" href="/admin">
      <span>Settings</span>
    </a>
  </nav>

  <div class="soc-sidebar-status">
    <span class="soc-pill-dot" aria-hidden="true"></span>
    <div>
      <strong>{{ system_status|default("System healthy") }}</strong>
      <span>{{ environment_name|default("local") }} · {{ tenant_name|default("default") }}</span>
    </div>
  </div>
</aside>
