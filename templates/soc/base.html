<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NetGuard SOC{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='soc-dashboard.css') }}">
</head>
<body class="soc-shell">
  <div class="soc-app">
    {% include "soc/partials/sidebar.html" %}
    <main class="soc-main">
      {% include "soc/partials/topbar.html" %}
      <section class="soc-page">
        <div class="soc-preview-banner">
          <span class="soc-preview-banner-kicker">Design System</span>
          <span class="soc-preview-banner-copy">This workspace is the new NetGuard SOC/XDR surface: cleaner hierarchy, lower noise, and host-first triage.</span>
        </div>
        {% block page %}{% endblock %}
      </section>
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
