<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard &mdash; Host Triage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <script src="/static/js/theme-toggle.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #050810; --s1: #0a0f1c; --s2: #121a2c; --s3: #1a2440;
      --border: #1f2c47; --txt: #eaf0fb; --txt2: #9aa6bd; --txt3: #5d6982;
      --blue:   #7eb8ff; --blue2: #1f6feb; --green: #5fd3a6; --green2: #238636;
      --orange: #f0b44b; --red: #ff6a7a; --purple: #c8a85a; --yellow: #f4e3b0;
      --accent: #c8a85a; --accent2: #e8d091;
    }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--txt); min-height: 100vh;
      background-image:
        linear-gradient(rgba(120,150,200,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,150,200,0.035) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; border-bottom:1px solid var(--border); background:rgba(13,17,23,.97); position:sticky; top:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:.6rem; font-size:1rem; font-weight:700; color:var(--blue); }
    .badge-admin { background:rgba(248,81,73,.15); color:var(--red); border:1px solid rgba(248,81,73,.3); padding:.2rem .6rem; border-radius:999px; font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
    .crumbs { color: var(--txt2); font-size: .82rem; }
    .crumbs a { color: var(--txt2); }
    .crumbs a:hover { color: var(--blue); }

    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .loading { padding: 4rem 2rem; text-align: center; color: var(--txt2); }
    .error-card { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.4); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .error-card h3 { color: var(--red); margin-bottom: .5rem; }

    /* Posture (top hero) */
    .posture { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .posture-row { display: flex; align-items: center; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
    .posture h1 { font-size: 1.5rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: .6rem; }
    .posture-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: .8rem; color: var(--txt2); font-size: .85rem; }
    .posture-meta span strong { color: var(--txt); font-weight: 600; }

    .status-pill { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .status-online   { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.4); }
    .status-offline  { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid rgba(248,81,73,.4); }
    .status-enrolled { background: rgba(88,166,255,.12); color: var(--blue);   border: 1px solid rgba(88,166,255,.35); }

    /* Two-column grid: risk + next-action */
    .triage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 900px) { .triage-grid { grid-template-columns: 1fr; } }

    .panel { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; }
    .panel h2 { font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--txt2); margin-bottom: 1rem; }

    /* Risk score */
    .risk-row { display: flex; align-items: center; gap: 1.5rem; }
    .risk-score-big { font-size: 4rem; font-weight: 700; line-height: 1; }
    .band-critical { color: var(--red); }
    .band-high     { color: var(--orange); }
    .band-medium   { color: var(--yellow); }
    .band-low      { color: var(--blue); }
    .band-none     { color: var(--green); }
    .band-pill { display: inline-block; padding: .25rem .7rem; border-radius: 999px; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .band-pill.band-critical { background: rgba(248,81,73,.15);  border: 1px solid rgba(248,81,73,.4); }
    .band-pill.band-high     { background: rgba(240,136,62,.15); border: 1px solid rgba(240,136,62,.4); }
    .band-pill.band-medium   { background: rgba(227,179,65,.15); border: 1px solid rgba(227,179,65,.4); }
    .band-pill.band-low      { background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.4); }
    .band-pill.band-none     { background: rgba(63,185,80,.15);  border: 1px solid rgba(63,185,80,.4); }

    .risk-breakdown { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .breakdown-item { display: flex; justify-content: space-between; padding: .45rem 0; font-size: .87rem; color: var(--txt); border-bottom: 1px dashed rgba(48,54,61,.5); }
    .breakdown-item:last-child { border-bottom: none; }
    .breakdown-points { color: var(--txt2); font-variant-numeric: tabular-nums; font-weight: 600; }

    /* Next action */
    .action-card .urgency-pill { float: right; }
    .action-card .action-text { font-size: 1.15rem; font-weight: 600; line-height: 1.4; margin: .4rem 0 .8rem; }
    .action-card .rationale { color: var(--txt2); font-size: .88rem; line-height: 1.5; }

    /* Timeline */
    .timeline-empty { text-align: center; padding: 2rem; color: var(--txt3); font-style: italic; }
    .event-row { display: grid; grid-template-columns: 110px 80px 1fr 100px; gap: 1rem; padding: .7rem .5rem; border-bottom: 1px solid var(--border); align-items: center; font-size: .85rem; }
    .event-row:last-child { border-bottom: none; }
    .event-time { color: var(--txt2); font-variant-numeric: tabular-nums; font-size: .78rem; }
    .sev-pill { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .68rem; font-weight: 700; letter-spacing: .04em; text-align: center; min-width: 60px; }
    .sev-CRITICAL { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid rgba(248,81,73,.4); }
    .sev-HIGH     { background: rgba(240,136,62,.15); color: var(--orange); border: 1px solid rgba(240,136,62,.4); }
    .sev-MEDIUM   { background: rgba(227,179,65,.15); color: var(--yellow); border: 1px solid rgba(227,179,65,.4); }
    .sev-LOW      { background: rgba(88,166,255,.12); color: var(--blue);   border: 1px solid rgba(88,166,255,.4); }
    .event-source { color: var(--txt3); font-family: 'Monaco', monospace; font-size: .78rem; }
    .triage-actions { display:flex; flex-wrap:wrap; gap:.6rem; margin:-.4rem 0 1.5rem; }
    .triage-actions button { background:var(--s2); border:1px solid var(--border); color:var(--txt); padding:.48rem .85rem; border-radius:8px; cursor:not-allowed; opacity:.62; }
    .side-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:1rem; margin-top:1.5rem; }
    .side-list { display:flex; flex-wrap:wrap; gap:.45rem; }
    .side-token { background:var(--s2); border:1px solid var(--border); border-radius:999px; color:var(--txt2); font-size:.75rem; padding:.22rem .55rem; }
    @media (max-width: 1050px) { .side-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width: 650px) { .side-grid { grid-template-columns:1fr; } }

    /* ── LIGHT THEME (Apple Pro day) ─────────────────────────── */
    body.theme-light {
      --bg:#f5f5f7; --s1:#ffffff; --s2:#fafafa; --s3:#f0f0f2;
      --border:rgba(0,0,0,0.08);
      --txt:#1d1d1f; --txt2:rgba(60,60,67,0.62); --txt3:rgba(60,60,67,0.40);
      --blue:#0066cc; --green:#248a3d; --red:#d70015;
      --orange:#c93400; --yellow:#9d8000; --purple:#9d44d8;
      --accent:#b8983f; --accent2:#c8a85a;
      background-image: linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
                         linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px) !important;
      background-size: 56px 56px !important;
    }
    body.theme-light header { background: rgba(255,255,255,0.94) !important; border-bottom-color: rgba(0,0,0,0.08) !important; }
    body.theme-light .logo, body.theme-light h1, body.theme-light h2, body.theme-light h3,
    body.theme-light .stat-value, body.theme-light .kpi-value { color:#1d1d1f !important; }
    body.theme-light .badge-admin { background:rgba(184,152,63,.10) !important; border-color:rgba(184,152,63,.32) !important; color:#806320 !important; }
    body.theme-light .container, body.theme-light main { color:#1d1d1f !important; }
    body.theme-light table, body.theme-light .panel,
    body.theme-light .stat-card, body.theme-light .audit-log,
    body.theme-light .table-wrap, body.theme-light .modal {
      background:#ffffff !important; border-color:rgba(0,0,0,0.08) !important; color:#1d1d1f !important;
    }
    body.theme-light thead, body.theme-light .audit-toolbar {
      background:#fafafa !important; color:rgba(60,60,67,0.62) !important;
    }
    body.theme-light tbody tr { border-bottom:1px solid rgba(0,0,0,0.06) !important; }
    body.theme-light tbody tr:hover, body.theme-light .audit-row:hover { background:rgba(0,0,0,0.025) !important; }
    body.theme-light input, body.theme-light select, body.theme-light textarea,
    body.theme-light .form-input, body.theme-light .audit-search {
      background:#ffffff !important; border-color:rgba(0,0,0,0.12) !important; color:#1d1d1f !important;
    }
    body.theme-light .btn-primary {
      background:#b8983f !important; color:#ffffff !important; border-color:#b8983f !important;
    }
    body.theme-light .btn-ghost, body.theme-light .audit-filter-btn,
    body.theme-light .toolbar button {
      background:#ffffff !important; border-color:rgba(0,0,0,0.16) !important; color:#1d1d1f !important;
    }
    body.theme-light .subtitle, body.theme-light .muted, body.theme-light .form-label,
    body.theme-light .stat-label, body.theme-light th, body.theme-light .ph-t {
      color:rgba(60,60,67,0.62) !important;
    }
    body.theme-light .badge-blue { background:rgba(0,102,204,.08) !important; border-color:rgba(0,102,204,.20) !important; color:#0040dd !important; }
    body.theme-light .badge-green { background:rgba(36,138,61,.08) !important; border-color:rgba(36,138,61,.20) !important; color:#1a6b30 !important; }
    body.theme-light .badge-red, body.theme-light .btn-danger { background:rgba(214,0,21,.06) !important; border-color:rgba(214,0,21,.18) !important; color:#a30010 !important; }
    body.theme-light .badge-orange { background:rgba(201,52,0,.08) !important; border-color:rgba(201,52,0,.20) !important; color:#c93400 !important; }
    body.theme-light .badge-purple { background:rgba(157,68,216,.08) !important; border-color:rgba(157,68,216,.20) !important; color:#7c2da3 !important; }
    body.theme-light .badge-gray { background:rgba(0,0,0,.05) !important; border-color:rgba(0,0,0,.10) !important; color:#1d1d1f !important; }
    body.theme-light a { color:#0066cc; }
    body.theme-light * { scrollbar-color: rgba(0,0,0,0.16) transparent !important; }
    body.theme-light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.16) !important; }

    /* theme-toggle button */
    .theme-toggle {
      width:32px; height:32px; border-radius:8px;
      border:1px solid var(--border, rgba(255,255,255,0.10));
      background:transparent; color:var(--txt2, #9aa6bd);
      cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
      padding:0; margin-right:8px;
      transition:background .2s, border-color .2s, color .2s;
    }
    .theme-toggle:hover {
      border-color:var(--accent, #c8a85a); color:var(--accent, #c8a85a);
    }
    body.theme-light .theme-toggle:hover { background:rgba(0,0,0,0.04); }
    .theme-toggle svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .theme-toggle .icon-sun { display:none; }
    .theme-toggle .icon-moon { display:block; }
    body.theme-light .theme-toggle .icon-sun { display:block; }
    body.theme-light .theme-toggle .icon-moon { display:none; }

  </style>
  <link rel="stylesheet" href="/static/css/netguard.css">
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7v6c0 5 4 9 10 11 6-2 10-6 10-11V7l-10-5z"/></svg>
      NetGuard
      <span class="badge-admin">God View</span>
    </div>
    <div class="crumbs">
      <a href="/admin">God View</a> &raquo;
      <a id="crumb-tenant" href="#">Tenant</a> &raquo;
      <span id="crumb-host">Host</span>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading">Carregando triagem do host…</div>
    <div id="error" style="display:none;"></div>
    <div id="content" style="display:none;">

      <!-- Posture -->
      <section class="posture">
        <div class="posture-row">
          <div>
            <h1>
              <span id="host-name">—</span>
              <span id="host-status" class="status-pill">—</span>
            </h1>
            <div class="posture-meta">
              <span><strong id="host-platform">—</strong></span>
              <span>IP: <strong id="host-ip">—</strong></span>
              <span id="host-geo"></span>
              <span>Último check-in: <strong id="host-lastseen">—</strong></span>
              <span>Agente: <strong id="host-agent">—</strong></span>
            </div>
          </div>
        </div>
      </section>

      <div class="triage-actions" aria-label="Host triage actions">
        <button type="button" disabled title="Requires an audited host investigation endpoint.">Mark as Investigating</button>
        <button type="button" disabled title="Use the incident API or SOC incidents queue until host-level creation is wired.">Create Incident</button>
        <button type="button" disabled title="Suppression requires RBAC, CSRF, and audit trail before enablement.">Suppress Host</button>
        <button type="button" disabled title="Report export placeholder for the host triage workflow.">Export Report</button>
      </div>

      <!-- Risk + Next Action -->
      <div class="triage-grid">
        <section class="panel">
          <h2>Risk Score</h2>
          <div class="risk-row">
            <div id="risk-score" class="risk-score-big">0</div>
            <div>
              <span id="risk-band" class="band-pill">—</span>
              <div style="margin-top:.4rem; color:var(--txt2); font-size:.8rem;">
                <span id="events-count">0</span> evento(s) nas últimas 24h
              </div>
            </div>
          </div>
          <div class="risk-breakdown" id="risk-breakdown"></div>
        </section>

        <section class="panel action-card">
          <h2>Próxima Ação <span id="urgency-pill" class="band-pill urgency-pill">—</span></h2>
          <div id="action-text" class="action-text">—</div>
          <div id="action-rationale" class="rationale">—</div>
        </section>
      </div>

      <!-- Timeline -->
      <section class="panel">
        <h2>Timeline (últimas 24h, top 50 eventos)</h2>
        <div id="timeline"></div>
      </section>

      <section class="side-grid" aria-label="Host triage context">
        <article class="panel">
          <h2>MITRE tactics</h2>
          <div id="side-mitre" class="side-list"></div>
        </article>
        <article class="panel">
          <h2>Related IPs</h2>
          <div id="side-ips" class="side-list"></div>
        </article>
        <article class="panel">
          <h2>Suspicious processes</h2>
          <div id="side-processes" class="side-list"></div>
        </article>
        <article class="panel">
          <h2>Agent status</h2>
          <div id="side-agent" class="side-list"></div>
        </article>
      </section>

    </div>
  </main>

  <script>
    (function() {
      // Path: /admin/host/<tenant_id>/<host_id>
      const parts = location.pathname.split("/").filter(Boolean);
      const tenantId = decodeURIComponent(parts[2] || "");
      const hostId   = decodeURIComponent(parts[3] || "");
      if (!tenantId || !hostId) {
        renderError("URL inválida — esperado /admin/host/&lt;tenant_id&gt;/&lt;host_id&gt;");
        return;
      }
      document.getElementById("crumb-tenant").href = "/admin#tenant=" + encodeURIComponent(tenantId);
      document.getElementById("crumb-tenant").textContent = tenantId;
      document.getElementById("crumb-host").textContent = hostId;

      function esc(s) {
        if (s === null || s === undefined) return "—";
        return String(s).replace(/[&<>"']/g, c => ({
          "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
        })[c]);
      }

      function fmtTime(iso) {
        if (!iso) return "—";
        try {
          const d = new Date(iso);
          if (isNaN(d)) return iso;
          return d.toLocaleString("pt-BR", { dateStyle:"short", timeStyle:"medium" });
        } catch { return iso; }
      }

      function renderError(msg) {
        document.getElementById("loading").style.display = "none";
        const el = document.getElementById("error");
        el.style.display = "block";
        el.innerHTML = '<div class="error-card"><h3>Erro</h3><p>' + esc(msg) + "</p></div>";
      }

      function urgencyBand(u) {
        return ({"critical":"band-critical","high":"band-high","medium":"band-medium","low":"band-low","none":"band-none"})[u] || "band-low";
      }

      fetch("/api/admin/tenant/" + encodeURIComponent(tenantId) + "/host/" + encodeURIComponent(hostId), {
        credentials: "same-origin",
      })
        .then(r => r.json().then(j => ({ ok: r.ok, status: r.status, body: j })))
        .then(({ ok, status, body }) => {
          if (!ok) {
            renderError((body && body.error) ? body.error + " (HTTP " + status + ")" : "HTTP " + status);
            return;
          }
          render(body);
        })
        .catch(err => renderError(String(err)));

      function render(data) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("content").style.display = "block";

        const host = data.host || {};
        const geo  = data.geo  || {};
        const risk = data.risk || { score: 0, band: "none", breakdown: [] };
        const next = data.next_action || { action: "—", rationale: "—", urgency: "none" };

        document.getElementById("host-name").textContent = host.display_name || host.host_id || "(sem nome)";
        const stEl = document.getElementById("host-status");
        const st = host.status || "enrolled";
        stEl.textContent = st;
        stEl.className = "status-pill status-" + st;

        document.getElementById("host-platform").textContent = host.platform || "—";
        document.getElementById("host-ip").textContent = host.last_ip || "—";
        document.getElementById("host-lastseen").textContent = fmtTime(host.last_seen);
        document.getElementById("host-agent").textContent = host.agent_version || "—";

        const geoBits = [];
        if (geo.flag)    geoBits.push(geo.flag);
        if (geo.city)    geoBits.push(geo.city);
        if (geo.country) geoBits.push(geo.country);
        if (geo.org)     geoBits.push("(" + geo.org + ")");
        document.getElementById("host-geo").textContent = geoBits.length ? geoBits.join(" ") : "";

        document.getElementById("events-count").textContent = data.events_24h_count || 0;

        const scoreEl = document.getElementById("risk-score");
        scoreEl.textContent = risk.score;
        scoreEl.className = "risk-score-big band-" + risk.band;

        const bandEl = document.getElementById("risk-band");
        bandEl.textContent = risk.band;
        bandEl.className = "band-pill band-" + risk.band;

        const bdEl = document.getElementById("risk-breakdown");
        if (risk.breakdown && risk.breakdown.length) {
          bdEl.innerHTML = risk.breakdown.map(b => (
            '<div class="breakdown-item"><span>' + esc(b.factor) + '</span><span class="breakdown-points">+' + b.points + "</span></div>"
          )).join("");
        } else {
          bdEl.innerHTML = '<div style="color:var(--txt3); font-style:italic; padding:.5rem 0;">Nenhum fator de risco detectado.</div>';
        }

        document.getElementById("action-text").textContent = next.action;
        document.getElementById("action-rationale").textContent = next.rationale;
        const upEl = document.getElementById("urgency-pill");
        upEl.textContent = next.urgency;
        upEl.className = "band-pill urgency-pill " + urgencyBand(next.urgency);

        const tEl = document.getElementById("timeline");
        const tl = data.timeline || [];
        if (!tl.length) {
          tEl.innerHTML = '<div class="timeline-empty">Sem eventos nas últimas 24h.</div>';
        } else {
          tEl.innerHTML = tl.map(e => (
            '<div class="event-row">' +
              '<span class="event-time">' + esc(fmtTime(e.timestamp)) + "</span>" +
              '<span class="sev-pill sev-' + esc(e.severity) + '">' + esc(e.severity || "—") + "</span>" +
              '<span>' + esc(e.summary || e.rule_name || "—") + "</span>" +
              '<span class="event-source">' + esc(e.source || "") + "</span>" +
            "</div>"
          )).join("");
        }

        function renderTokens(id, values, emptyText) {
          const target = document.getElementById(id);
          const unique = Array.from(new Set(values.filter(Boolean).map(String))).slice(0, 10);
          target.innerHTML = unique.length
            ? unique.map(v => '<span class="side-token">' + esc(v) + '</span>').join("")
            : '<span class="muted">' + esc(emptyText) + '</span>';
        }

        renderTokens("side-mitre", tl.map(e => e.mitre_tactic || e.tactic || e.rule_name), "No MITRE mapping yet");
        renderTokens("side-ips", [host.last_ip].concat(tl.map(e => e.source_ip)).concat(tl.map(e => e.network_dst_ip)), "No related IPs");
        renderTokens("side-processes", tl.map(e => e.process_name), "No process signal");
        renderTokens("side-agent", [host.status || "enrolled", host.platform || "", host.agent_version || ""], "No agent details");
      }
    })();
  </script>
  <script src="/static/js/netguard-ui.js" defer></script>
</body>
