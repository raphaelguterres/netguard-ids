name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Tests ──────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Fail the job if requirements cannot be installed
          pip install -r requirements.docker.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          IDS_AUTH: "false"
          IDS_DASHBOARD_AUTH: "false"
          IDS_CSRF_DISABLED: "false"
          HTTPS_ONLY: "false"
        run: |
          pytest tests/ -v --tb=short --strict-markers

      - name: Coverage report
        if: always()
        env:
          IDS_AUTH: "false"
          IDS_DASHBOARD_AUTH: "false"
          IDS_CSRF_DISABLED: "false"
          HTTPS_ONLY: "false"
        run: |
          pytest tests/ -q --tb=no \
            --cov=. \
            --cov-omit="tests/*,venv/*,.venv/*" \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=40 \
            2>&1 | tail -25

      - name: Write coverage to job summary
        if: always()
        run: |
          echo "## Test Results — Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pytest tests/ --tb=no -q 2>&1 | tail -10 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── Job 2: Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install linters
        run: pip install flake8 flake8-bugbear

      - name: Run flake8 (fatal errors + common bugs)
        run: |
          # E9xx  = runtime errors (syntax, undefined names)
          # F401  = unused imports
          # F811  = redefinition of unused name
          # W605  = invalid escape sequences
          # B    = flake8-bugbear bug patterns
          flake8 . \
            --select=E9,F401,F811,W605,B \
            --exclude=.git,__pycache__,*.egg-info,venv,.venv,migrations \
            --max-line-length=120 \
            --statistics \
            --count
        # Note: B9xx (opinionated bugbear) are warnings, not errors

  # ── Job 3: Security Audit ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies for audit
        run: pip install -r requirements.docker.txt

      - name: Audit dependencies for CVEs
        # Fails CI on any unignored CVE — no silent fallback
        run: |
          pip-audit --requirement requirements.docker.txt \
            --ignore-vuln GHSA-jfh8-c2jp-jqjq \
            --format=columns \
            --output=pip-audit-report.txt || {
              echo "::error::pip-audit found vulnerabilities — see artifact for details"
              cat pip-audit-report.txt
              exit 1
            }

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
          retention-days: 30

  # ── Job 4: Type check (optional, non-blocking) ────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true   # informational until coverage improves

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install mypy + stubs
        run: |
          pip install mypy types-requests
          pip install -r requirements.docker.txt

      - name: Run mypy (engine modules only)
        run: |
          mypy engine/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --pretty \
            --show-error-codes \
            2>&1 | tail -40
