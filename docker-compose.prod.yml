version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  NetGuard IDS — docker-compose de PRODUÇÃO
#
#  Pré-requisitos:
#    1. Domínio apontando para o IP do servidor
#    2. Arquivo .env preenchido (copie .env.example)
#    3. docker compose up -d --build
#    4. Emitir certificado: ./scripts/certbot-init.sh YOUR_DOMAIN
#
#  Para renovação automática, o Certbot já roda via cron.
# ─────────────────────────────────────────────────────────────────

services:

  # ── Aplicação Flask ───────────────────────────────────────────
  netguard:
    build: .
    container_name: netguard_app
    restart: unless-stopped
    env_file: .env
    environment:
      IDS_HOST: "0.0.0.0"
      IDS_PORT: "5000"
      HTTPS_ONLY: "true"
      IDS_DASHBOARD_AUTH: "true"
    volumes:
      - netguard_data:/data
      - netguard_logs:/app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    # Não expõe porta diretamente — tráfego só via Nginx
    expose:
      - "5000"

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: netguard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/netguard.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
      - external
    depends_on:
      - netguard

  # ── Certbot (Let's Encrypt) ───────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: netguard_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Roda a cada 12h e renova se faltar < 30 dias
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done'

volumes:
  netguard_data:
  netguard_logs:
  nginx_logs:
  certbot_www:
  certbot_conf:

networks:
  internal:
    internal: true   # Flask não tem acesso direto à internet
  external:
    driver: bridge
