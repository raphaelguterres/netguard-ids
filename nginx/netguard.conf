# ─────────────────────────────────────────────────────────────────
#  NetGuard IDS — Nginx reverse proxy com HTTPS (Let's Encrypt)
#
#  Substitua YOUR_DOMAIN pelo domínio real antes de subir.
#  Certbot vai reescrever este arquivo automaticamente ao emitir o certificado.
# ─────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Desafio ACME do Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tudo o mais → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── Certificados (gerenciados pelo Certbot) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de segurança ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── Rate limiting (protege endpoints sensíveis) ───────────────
    # Define zonas no bloco http{} — aqui aplicamos por location
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    # ── Logs ──────────────────────────────────────────────────────
    access_log /var/log/nginx/netguard_access.log;
    error_log  /var/log/nginx/netguard_error.log warn;

    # ── Proxy para o Flask ────────────────────────────────────────
    location / {
        proxy_pass         http://netguard:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ── Rate limit no endpoint de login ──────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://netguard:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Webhook Stripe (sem rate limit agressivo) ─────────────────
    location /stripe/webhook {
        proxy_pass         http://netguard:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Stripe precisa do body raw para validação de assinatura
        proxy_request_buffering off;
    }

    # ── Bloqueia acesso a arquivos sensíveis ──────────────────────
    location ~ /\.(git|env|netguard_token|htpasswd) {
        deny all;
        return 404;
    }

    location ~ \.(db|log|key|pem)$ {
        deny all;
        return 404;
    }
}
